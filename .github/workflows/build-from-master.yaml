name: "Build image from master"

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Which platforms to build'
        required: false
        default: all
        type: choice
        options: [all, amd64, arm64, armv7, '386', amd64+arm64]

concurrency:
  group: build-from-master-${{ github.ref }}
  cancel-in-progress: true     # dev 构建：同分支新 push 取消旧构建

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # docker/Dockerfile 是 Go 交叉编译（FROM --platform=$BUILDPLATFORM），重活在
  # build 平台上完成；只有 runtime 层 `apk add ca-certificates` 在目标架构跑、
  # 需要 QEMU。所以单个 ubuntu-latest + QEMU 就能一次出全部架构。
  build:
    runs-on: ubuntu-latest      # 如有自建 runner 可改为 self-hosted
    steps:
      - name: Check out master
        uses: actions/checkout@v5
        with:
          fetch-depth: 0        # 取完整历史，便于将来按需追溯

      - name: Resolve image / sha / date / platforms
        id: prep
        run: |
          set -euo pipefail
          echo "image=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA:0:8}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
          p="${{ inputs.platforms }}"
          [ -z "$p" ] && p=all
          case "$p" in
            all)         plats="linux/amd64,linux/arm64,linux/arm/v7,linux/386" ;;
            amd64)       plats="linux/amd64" ;;
            arm64)       plats="linux/arm64" ;;
            armv7)       plats="linux/arm/v7" ;;
            386)         plats="linux/386" ;;
            amd64+arm64) plats="linux/amd64,linux/arm64" ;;
            *) echo "::error::unknown platforms input: $p"; exit 1 ;;
          esac
          echo "platforms=$plats" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: ${{ steps.prep.outputs.platforms }}
          push: true
          provenance: false
          sbom: false
          build-args: |
            VERSION=${{ steps.prep.outputs.short_sha }}
            COMMIT=${{ steps.prep.outputs.short_sha }}
            DATE=${{ steps.prep.outputs.date }}
          # :master 永远滚动指向最新 master；:<sha> 固定可追溯到具体提交。
          tags: |
            ${{ steps.prep.outputs.image }}:master
            ${{ steps.prep.outputs.image }}:${{ steps.prep.outputs.short_sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=master
          cache-to: type=gha,mode=max,scope=master

      - name: Inspect
        run: docker buildx imagetools inspect ${{ steps.prep.outputs.image }}:master
